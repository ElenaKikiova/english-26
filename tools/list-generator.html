<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image List Generator</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Image List Generator</h1>
      <p class="subtitle">Legacy — use <a href="games-editor.html">Games Editor</a> instead</p>
    </header>

    <p class="note">
      <strong>Recommended:</strong> use the <a href="games-editor.html">Games Editor</a> to manage all games.
      <br><a href="../index.html">← Back to games</a>
    </p>

    <div class="form-group">
      <label for="folder">Select image folder</label>
      <input type="file" id="folder" webkitdirectory multiple>
    </div>

    <div id="output" class="link-output hidden">
      <p><strong>Files found:</strong> <span id="count"></span></p>
      <textarea id="json" readonly></textarea>
      <br><br>
      <button type="button" id="btn-download" class="btn-primary">Download list.json</button>
    </div>
  </div>

  <script>
    const IMAGE_EXT = /\.(avif|gif|jpe?g|png|svg|webp)$/i;

    document.getElementById('folder').addEventListener('change', (e) => {
      const files = Array.from(e.target.files)
        .map((f) => f.name)
        .filter((name) => IMAGE_EXT.test(name) && name !== 'list.json')
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

      if (files.length === 0) return;

      const json = JSON.stringify(files, null, 2);
      document.getElementById('count').textContent = files.length;
      document.getElementById('json').value = json;
      document.getElementById('output').classList.remove('hidden');

      document.getElementById('btn-download').onclick = () => {
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'list.json';
        a.click();
      };
    });
  </script>
</body>
</html>
